<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>سامانه مدرسه یاب ناحیه ۵ مشهد</title>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Vazirmatn',sans-serif;
}

body{

background:#eef3fb;

}

header{

background:linear-gradient(135deg,#003c8f,#0d6efd);

color:white;

padding:20px;

box-shadow:0 4px 12px rgba(0,0,0,.2);

}

.header{

display:flex;

align-items:center;

justify-content:center;

gap:20px;

}

.header img{

width:90px;

height:90px;

border-radius:50%;

background:white;

padding:5px;

}

.header h1{

font-size:28px;

}

.header h3{

font-weight:300;

margin-top:8px;

}

.container{

max-width:900px;

margin:auto;

margin-top:40px;

background:white;

padding:35px;

border-radius:20px;

box-shadow:0 10px 30px rgba(0,0,0,.15);

}

.row{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

gap:20px;

margin-bottom:20px;

}

label{

display:block;

margin-bottom:8px;

font-weight:bold;

color:#003c8f;

}

select,input{

width:100%;

padding:13px;

border:1px solid #ccc;

border-radius:12px;

font-size:15px;

}

button{

width:100%;

padding:15px;

background:#0d6efd;

color:white;

border:none;

border-radius:12px;

font-size:18px;

cursor:pointer;

transition:.3s;

}

button:hover{

background:#003c8f;

}

#result{

margin-top:30px;

display:none;

}

.card{

background:#f8fbff;

border-right:8px solid #0d6efd;

padding:25px;

border-radius:15px;

line-height:2;

}

footer{

margin-top:50px;

background:#003c8f;

color:white;

text-align:center;

padding:18px;

}

</style>

</head>

<body>

<header>

<div class="header">

<img src="logo.png">

<div>

<h1>سامانه مدرسه‌یاب ناحیه ۵ مشهد مقدس</h1>

<h3>معاونت آموزش ابتدایی</h3>

</div>

</div>

</header>

<div class="container">

<div class="row">

<div>

<label>پایه تحصیلی</label>

<select id="grade">

<option>اول</option>

<option>دوم</option>

<option>سوم</option>

<option>چهارم</option>

<option>پنجم</option>

<option>ششم</option>

</select>

</div>

<div>

<label>جنسیت دانش‌آموز</label>

<select id="gender">

<option>پسر</option>

<option>دختر</option>

</select>

</div>

</div>

<div class="row">

<div>

<label>نام کوچه</label>

<input id="street" placeholder="مثلاً شهید بهشتی">

</div>

<div>

<label>شماره پلاک</label>

<input id="number" type="number">

</div>

</div>

<button onclick="searchSchool()">

🔍 جستجوی مدرسه

</button>

<div id="result">

<div class="card">

<h2 id="schoolName">نام مدرسه</h2>

<hr><br>

<p><b>شیفت:</b> <span id="shift"></span></p>

<p><b>تلفن:</b> <span id="phone"></span></p>

<p><b>آدرس:</b> <span id="address"></span></p>

<p><b>مدارس مجاور:</b> <span id="near"></span></p>

</div>

</div>

</div>

<footer>

اداره آموزش و پرورش ناحیه ۵ مشهد مقدس | معاونت آموزش ابتدایی

</footer>

<script>

function searchSchool(){

document.getElementById("result").style.display="block";

}

</script>

</body>

</html>
