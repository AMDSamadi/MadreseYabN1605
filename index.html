<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>یاب مدرسه</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Tahoma', 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: bold;
        }
        
        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .content {
            padding: 40px;
        }
        
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        input {
            flex: 1;
            min-width: 200px;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: all 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.1);
        }
        
        button {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .results {
            display: none;
        }
        
        .results.show {
            display: block;
        }
        
        .main-school {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.2);
        }
        
        .main-school h2 {
            font-size: 1.8em;
            margin-bottom: 15px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.3);
            padding-bottom: 10px;
        }
        
        .school-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
        }
        
        .info-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 12px;
            border-radius: 6px;
        }
        
        .info-label {
            font-size: 0.9em;
            opacity: 0.9;
            margin-bottom: 5px;
        }
        
        .info-value {
            font-size: 1.1em;
            font-weight: bold;
        }
        
        .adjacent-title {
            font-size: 1.4em;
            margin-bottom: 20px;
            color: #333;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }
        
        .adjacent-schools {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        
        .school-card {
            background: #f9f9f9;
            border-right: 4px solid #667eea;
            padding: 20px;
            border-radius: 8px;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
        }
        
        .school-card:hover {
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            transform: translateY(-5px);
        }
        
        .school-card h3 {
            color: #667eea;
            margin-bottom: 12px;
            font-size: 1.2em;
        }
        
        .school-card p {
            margin: 8px 0;
            color: #555;
            line-height: 1.6;
        }
        
        .school-card strong {
            color: #333;
        }
        
        .no-results {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        .no-results p {
            font-size: 1.1em;
            margin-bottom: 10px;
        }
        
        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-right: 4px solid #c33;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: right;
        }
        
        .hint {
            background: #f0f4ff;
            color: #667eea;
            padding: 15px;
            border-right: 4px solid #667eea;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: right;
            font-size: 0.95em;
        }
        
        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.8em;
            }
            
            .school-info {
                grid-template-columns: 1fr;
            }
            
            .adjacent-schools {
                grid-template-columns: 1fr;
            }
            
            .content {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏫 یاب مدرسه</h1>
            <p>جستجو برای مدرسه خود</p>
        </div>
        
        <div class="content">
            <div class="search-box">
                <input type="text" id="streetInput" placeholder="نام خیابان (مثلاً: نبوت)">
                <input type="number" id="numberInput" placeholder="شماره کوچه (مثلاً: 45)">
                <button onclick="search()">جستجو</button>
            </div>
            
            <div class="hint">
                💡 راهنما: نام خیابان و شماره کوچه را وارد کنید تا مدرسه اصلی و مدارس مجاور نمایش داده شود
            </div>
            
            <div class="results" id="results"></div>
        </div>
    </div>
    
    <script>
        let schoolsData = [];
        
        async function loadData() {
            try {
                const response = await fetch('schools.json');
                schoolsData = await response.json();
            } catch (error) {
                console.error('خطا:', error);
            }
        }
        
        function search() {
            const street = document.getElementById('streetInput').value.trim();
            const number = document.getElementById('numberInput').value.trim();
            const resultsDiv = document.getElementById('results');
            
            if (!street || !number) {
                resultsDiv.innerHTML = '<div class="error">❌ لطفاً نام خیابان و شماره کوچه را وارد کنید</div>';
                resultsDiv.classList.add('show');
                return;
            }
            
            const searchStr = `${street} ${number}`.trim();
            const mainSchool = schoolsData.find(school => 
                school.streets.some(s => s.trim() === searchStr)
            );
            
            if (!mainSchool) {
                resultsDiv.innerHTML = '<div class="no-results"><p>❌ ��درس مورد نظر یافت نشد</p></div>';
                resultsDiv.classList.add('show');
                return;
            }
            
            const adjacentNames = mainSchool.adjacent.split('\n').map(n => n.trim()).filter(n => n);
            const adjacentSchools = schoolsData.filter(school => adjacentNames.includes(school.name) && school.name !== mainSchool.name);
            
            let html = '<div class="results show"><div class="main-school">';
            html += `<h2>🎯 مدرسه اصلی</h2><h2 style="font-size: 1.5em;">${mainSchool.name}</h2>`;
            html += '<div class="school-info">';
            html += `<div class="info-item"><div class="info-label">📍 آدرس:</div><div class="info-value">${mainSchool.address}</div></div>`;
            html += `<div class="info-item"><div class="info-label">📞 تلفن:</div><div class="info-value">${mainSchool.phone}</div></div>`;
            html += `<div class="info-item"><div class="info-label">👥 جنسیت:</div><div class="info-value">${mainSchool.gender}</div></div>`;
            html += `<div class="info-item"><div class="info-label">⏰ نوبت:</div><div class="info-value">${mainSchool.shift}</div></div>`;
            html += '</div></div>';
            
            if (adjacentSchools.length > 0) {
                html += '<h2 class="adjacent-title">🏫 مدارس مجاور</h2><div class="adjacent-schools">';
                adjacentSchools.forEach(school => {
                    html += `<div class="school-card"><h3>${school.name}</h3>`;
                    html += `<p><strong>📍 آدرس:</strong> ${school.address}</p>`;
                    html += `<p><strong>📞 تلفن:</strong> ${school.phone}</p>`;
                    html += `<p><strong>👥 جنسیت:</strong> ${school.gender}</p>`;
                    html += `<p><strong>⏰ نوبت:</strong> ${school.shift}</p></div>`;
                });
                html += '</div>';
            }
            
            html += '</div>';
            resultsDiv.innerHTML = html;
            resultsDiv.classList.add('show');
        }
        
        document.addEventListener('DOMContentLoaded', loadData);
        document.getElementById('streetInput')?.addEventListener('keypress', e => e.key === 'Enter' && search());
        document.getElementById('numberInput')?.addEventListener('keypress', e => e.key === 'Enter' && search());
    </script>
</body>
</html>
